<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Bíblia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #f5f5f5; --card: #ffffff; --text: #333; --accent: #1a1a1a; --gold: #b8860b; }
        .dark { --bg: #121212; --card: #1e1e1e; --text: #eee; --accent: #bb86fc; --gold: #f1c40f; }

        * { box-sizing: border-box; } /* Previne desalinhamento por padding */

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        header { background: #000; color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; width: 100%; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 1px solid rgba(0,0,0,0.05); }

        .bible-box { cursor: pointer; padding: 20px; transition: transform 0.2s; }
        .bible-box:active { transform: scale(0.95); }
        .bible-icon { font-size: 70px; display: block; margin-bottom: 10px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 15px; }
        .tabs button { flex: 1; padding: 12px; border: none; border-radius: 12px; background: transparent; cursor: pointer; font-weight: 600; color: var(--text); }
        .tabs button.active-tab { background: var(--card); color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .search-box { display: flex; gap: 8px; margin-top: 20px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 16px; width: 100%; }
        
        .btn-main { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-share { background: #25d366; }
        .btn-fav { background: #ff4757; }

        .versiculo-texto { font-size: 1.2rem; line-height: 1.5; margin: 15px 0; font-style: italic; }
        .referencia { font-weight: 800; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        
        /* TELAS DE TRANSIÇÃO (SPLASH) - CORRIGIDAS */
        .overlay-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            transition: opacity 0.5s ease;
            text-align: center;
        }

        #daily-word-screen { 
            background: var(--bg); 
            color: var(--text); 
            display: none; 
            padding: 40px; 
        }
        
        #daily-word-screen .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin: 0; /* Remove margens do container na splash */
        }

        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAIS E EXPORTAÇÃO */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        #final-image { max-width: 90%; border-radius: 15px; border: 5px solid white; }
        #export-container { padding: 50px; background: #1a1a1a; color: white; text-align: center; position: absolute; left: -9999px; width: 500px; height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 8px solid var(--gold); }

        .toggle { position: fixed; top: 18px; right: 20px; cursor: pointer; font-size: 20px; z-index: 100; }
        .animate-pop { animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="loading-screen" class="overlay-screen">
    <div class="loader"></div>
    <div style="letter-spacing: 3px; font-weight: bold; font-size: 14px;">CRIADO POR JNAPK</div>
</div>

<div id="daily-word-screen" class="overlay-screen">
    <div class="container">
        <small style="color: var(--gold); text-transform: uppercase; font-weight: bold; letter-spacing: 2px;">Palavra de Hoje</small>
        <div id="splash-ref" class="referencia" style="margin-top: 15px; font-size: 1.1rem;"></div>
        <div id="splash-texto" class="versiculo-texto" style="font-size: 1.4rem;"></div>
        <button class="btn-main" onclick="fecharSplash()" style="max-width: 250px; margin-top: 20px;">Entrar no App →</button>
    </div>
</div>

<header>Minha Bíblia</header>
<div class="toggle" onclick="toggleDark()">🌓</div>

<div class="container">
    <div class="tabs">
        <button id="btn-leitura" class="active-tab" onclick="switchTab('leitura')">Inspiração</button>
        <button id="btn-favs" onclick="switchTab('favs')">Favoritos ❤️</button>
    </div>

    <div id="tab-leitura">
        <div class="card">
            <div class="bible-box" onclick="abrirBiblia()">
                <span class="bible-icon" id="bible-emoji">📘</span>
                <small id="hint-text">Toque na Bíblia para tirar uma palavra</small>
            </div>
            
            <div id="box-mensagem" style="display: none;">
                <div class="referencia" id="dia-ref"></div>
                <div id="dia-texto" class="versiculo-texto"></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main btn-fav" onclick="salvarFavorito()">❤️</button>
                    <button class="btn-main btn-share" onclick="gerarImagem()">📸 Postar</button>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="busca" placeholder="Buscar versículo (ex: João 3:16)">
            <button class="btn-main" onclick="buscarBiblia()" style="width: 60px; margin: 0;">🔎</button>
        </div>

        <div id="resultado" class="card" style="display:none;">
            <span id="res-ref" class="referencia"></span>
            <div id="res-texto" class="versiculo-texto"></div>
            <button class="btn-main btn-fav" onclick="salvarFavorito()">❤️ Salvar</button>
            <button class="btn-main btn-share" onclick="gerarImagem()">📸 Exportar</button>
        </div>
    </div>

    <div id="tab-favs" style="display:none;">
        <h3 style="margin-top:0;">Versículos Salvos</h3>
        <div id="lista-favoritos"></div>
    </div>
</div>

<div id="modal" class="modal-overlay" onclick="fecharModal()">
    <p style="color: white; margin-bottom: 10px;">Segure na imagem para salvar!</p>
    <img id="final-image" src="">
    <button class="btn-main" style="width: 120px; background: #333; margin-top: 15px;">Fechar</button>
</div>

<div id="export-container">
    <div style="font-size: 26px; font-style: italic; margin-bottom: 20px; line-height: 1.4;" id="exp-texto"></div>
    <div style="font-weight: bold; font-size: 18px; border-top: 2px solid var(--gold); padding-top: 10px; color: var(--gold);" id="exp-ref"></div>
    <div style="margin-top: 40px; font-size: 10px; opacity: 0.5; letter-spacing: 2px;">COMPARTILHADO VIA MINHA BÍBLIA</div>
</div>

<script>
    let currentVersiculo = { texto: '', ref: '' };

    const versiculosInternos = [
        { ref: "Salmos 23:1", texto: "O Senhor é o meu pastor; nada me faltará." },
        { ref: "João 3:16", texto: "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna." },
        { ref: "Filipenses 4:13", texto: "Posso todas as coisas naquele que me fortalece." },
        { ref: "Josué 1:9", texto: "Não fui eu que ordenei a você? Seja forte e corajoso! Não se apavore nem desanime, pois o Senhor, o seu Deus, estará com você por onde você andar." },
        { ref: "Jeremias 29:11", texto: "Porque sou eu que conheço os planos que tenho para vocês, diz o Senhor, planos de fazê-los prosperar e não de causar dano, planos de dar a vocês esperança e um futuro." },
        { ref: "Salmos 46:1", texto: "Deus é o nosso refúgio e a nossa fortaleza, auxílio sempre presente na adversidade." },
        { ref: "Romanos 8:28", texto: "Sabemos que todas as coisas cooperam para o bem daqueles que amam a Deus, daqueles que são chamados segundo o seu propósito." },
        { ref: "Isaías 41:10", texto: "Não temas, porque eu sou contigo; não te assombres, porque eu sou teu Deus; eu te fortaleço, e te ajudo, e te sustento com a destra da minha justiça." },
        { ref: "Provérbios 3:5", texto: "Confie no Senhor de todo o seu coração e não se apoie em seu próprio entendimento." },
        { ref: "Mateus 11:28", texto: "Venham a mim, todos os que estão cansados e sobrecarregados, e eu darei descanso a vocês." }
    ];

    window.onload = function() {
        renderizarFavoritos();

        const sorteado = versiculosInternos[Math.floor(Math.random() * versiculosInternos.length)];
        document.getElementById('splash-texto').innerText = `"${sorteado.texto}"`;
        document.getElementById('splash-ref').innerText = sorteado.ref;

        setTimeout(() => {
            const loading = document.getElementById('loading-screen');
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
                const splash = document.getElementById('daily-word-screen');
                splash.style.display = 'flex';
                splash.classList.add('animate-pop');
            }, 500);
        }, 2000);
    };

    function fecharSplash() {
        const splash = document.getElementById('daily-word-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
    }

    function abrirBiblia() {
        const emoji = document.getElementById('bible-emoji');
        const box = document.getElementById('box-mensagem');
        const hint = document.getElementById('hint-text');
        
        emoji.innerText = "📖";
        const sorteado = versiculosInternos[Math.floor(Math.random() * versiculosInternos.length)];
        currentVersiculo = sorteado;
        
        document.getElementById('dia-texto').innerText = sorteado.texto;
        document.getElementById('dia-ref').innerText = sorteado.ref;
        
        box.style.display = "block";
        box.classList.add('animate-pop');
        hint.innerText = "Toque novamente para outra palavra";
        setTimeout(() => box.classList.remove('animate-pop'), 400);
    }

    async function buscarBiblia() {
        const query = document.getElementById('busca').value;
        if(!query) return;
        try {
            const res = await fetch(`https://bible-api.com/${query}?translation=almeida`);
            if(!res.ok) throw new Error();
            const json = await res.json();
            currentVersiculo = { texto: json.text, ref: json.reference };
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('res-ref').innerText = json.reference;
            document.getElementById('res-texto').innerText = json.text;
            document.getElementById('box-mensagem').style.display = 'none';
        } catch (e) { 
            alert("Não encontrei esse versículo. Tente algo como 'Salmos 23:1'"); 
        }
    }

    function salvarFavorito() {
        if(!currentVersiculo.ref) return;
        let favs = JSON.parse(localStorage.getItem('minha-biblia-favs') || '[]');
        if(!favs.some(f => f.ref === currentVersiculo.ref)) {
            favs.push(currentVersiculo);
            localStorage.setItem('minha-biblia-favs', JSON.stringify(favs));
            renderizarFavoritos();
            alert("Salvo nos Favoritos! ❤️");
        }
    }

    function renderizarFavoritos() {
        const lista = document.getElementById('lista-favoritos');
        let favs = JSON.parse(localStorage.getItem('minha-biblia-favs') || '[]');
        lista.innerHTML = favs.length ? favs.map(f => `
            <div class="card" style="text-align: left; padding: 15px; margin-top: 10px;">
                <span class="referencia" style="font-size: 0.7rem;">${f.ref}</span>
                <p style="margin: 5px 0; font-size: 0.9rem;">${f.texto}</p>
            </div>
        `).reverse().join('') : '<p style="text-align:center; opacity:0.5; margin-top:20px;">Você ainda não favoritou versículos.</p>';
    }

    function gerarImagem() {
        if(!currentVersiculo.texto) return;
        const container = document.getElementById('export-container');
        document.getElementById('exp-texto').innerText = `"${currentVersiculo.texto.trim()}"`;
        document.getElementById('exp-ref').innerText = currentVersiculo.ref;

        html2canvas(container).then(canvas => {
            document.getElementById('final-image').src = canvas.toDataURL("image/png");
            document.getElementById('modal').style.display = 'flex';
        });
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; }
    
    function switchTab(tab) {
        document.getElementById('tab-leitura').style.display = tab === 'leitura' ? 'block' : 'none';
        document.getElementById('tab-favs').style.display = tab === 'favs' ? 'block' : 'none';
        document.getElementById('btn-leitura').className = tab === 'leitura' ? 'active-tab' : '';
        document.getElementById('btn-favs').className = tab === 'favs' ? 'active-tab' : '';
    }

    function toggleDark() { document.body.classList.toggle("dark"); }
</script>

</body>
</html>
